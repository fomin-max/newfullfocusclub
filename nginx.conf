# Full Focus Club — Nginx virtual host
# Установить: cp nginx.conf /etc/nginx/sites-available/fullfocusclub
# Включить:   ln -s /etc/nginx/sites-available/fullfocusclub /etc/nginx/sites-enabled/
# После SSL:  certbot --nginx -d fullfocusclub.ru -d www.fullfocusclub.ru

# Редирект HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name fullfocusclub.ru www.fullfocusclub.ru;
    return 301 https://fullfocusclub.ru$request_uri;
}

# Редирект www → без www (SEO: канонический URL)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.fullfocusclub.ru;

    # SSL блок заполнит Certbot
    ssl_certificate     /etc/letsencrypt/live/fullfocusclub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fullfocusclub.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://fullfocusclub.ru$request_uri;
}

# Основной хост
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fullfocusclub.ru;

    # SSL блок заполнит Certbot
    ssl_certificate     /etc/letsencrypt/live/fullfocusclub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fullfocusclub.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Логи
    access_log /var/log/nginx/fullfocusclub-access.log;
    error_log  /var/log/nginx/fullfocusclub-error.log;

    # Gzip для текстовых ресурсов
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Статика Next.js (_next/static) — кэш на год, неизменяемые хэшированные файлы
    location /_next/static/ {
        alias /var/www/fullfocusclub/.next/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Public-ассеты (шрифты, изображения, favicon, sitemap, robots)
    location /assets/ {
        root /var/www/fullfocusclub/public;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location /fonts/ {
        root /var/www/fullfocusclub/public;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # sitemap.xml и robots.txt — без кэша, чтобы обновления применялись сразу
    location ~* ^/(sitemap\.xml|robots\.txt)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }

    # API routes — без кэша
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store";
    }

    # Всё остальное — через Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Таймауты для SSR-страниц
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
